
name: ImpRYnt Agent

on:
  workflow_dispatch:
    inputs:
      ticketRunId:
        required: true
        type: string
      ticketId:
        required: true
        type: string
      ticketTitle:
        required: true
        type: string
      ticketDescription:
        required: false
        type: string
        default: ""
      ticketBreadcrumb:
        required: false
        type: string
        default: ""
      branchName:
        required: true
        type: string
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Runs the coding agent for one ticket: creates a branch, implements the
  # ticket, runs this repo's own test suite as a gate (the agent is told to
  # fix failures rather than stop), pushes, opens a PR, then reports back to
  # ImpRYnt so it can show the PR link. Any failure here reports "failed",
  # which stops the whole milestone run rather than skipping ahead.
  implement:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "imprynt-agent[bot]"
          git config user.email "imprynt-agent[bot]@users.noreply.github.com"

      # workflow_dispatch's own API response never returns the run it just
      # created, so this is the only way ImpRYnt learns which run belongs
      # to which ticket — needed before it can show live step progress.
      - name: Report started to ImpRYnt
        run: |
          curl -sf -X POST "https://imprynt.space/api/v1/pipeline/ticket-runs/${{ inputs.ticketRunId }}/started" \
            -H "Authorization: Bearer ${{ secrets.IMPRYNT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"runId\": \"${{ github.run_id }}\", \"runUrl\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Create branch
        run: git checkout -b "${{ inputs.branchName }}"

      - name: Run the coding agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are implementing a single ticket end to end in this repository.

            Ticket: ${{ inputs.ticketTitle }}
            Location: ${{ inputs.ticketBreadcrumb }}
            Details:
            ${{ inputs.ticketDescription }}

            Implement this ticket completely. Then run this repository's own
            test suite and fix any failures your change introduces — do not
            stop until the suite passes, or until you are confident the repo
            has no runnable test suite. Commit your work with a clear message.

            When you are done, report whether the test suite passed. Only
            report true if you actually ran it and it passed, or the repo
            genuinely has no runnable test suite — never guess.
          claude_args: |
            --allowedTools Bash,Edit,Read,Write,Grep,Glob
            --json-schema '{"type":"object","properties":{"testsPass":{"type":"boolean"},"testSummary":{"type":"string"}},"required":["testsPass"]}'


      # Claude Code's own transcript (which the action already writes and
      # exposes as execution_file) ends with a type:"result" entry carrying
      # cost_usd and token usage — read regardless of success/failure so a
      # failed run's spend is still visible, not just a completed one.
      - name: Extract usage from the agent's execution log
        id: usage
        if: always()
        run: |
          FILE="${{ steps.agent.outputs.execution_file }}"
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            RESULT=$(jq -c '[.[] | select(.type=="result")] | last // {}' "$FILE")
            echo "costUsd=$(echo "$RESULT" | jq -r '.cost_usd // empty')" >> "$GITHUB_OUTPUT"
            echo "inputTokens=$(echo "$RESULT" | jq -r '.usage.input_tokens // empty')" >> "$GITHUB_OUTPUT"
            echo "outputTokens=$(echo "$RESULT" | jq -r '.usage.output_tokens // empty')" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        run: git push origin "${{ inputs.branchName }}"

      - name: Open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(gh pr create \
            --title "${{ inputs.ticketTitle }}" \
            --body "Implements: ${{ inputs.ticketBreadcrumb }} — ${{ inputs.ticketTitle }}

          Opened automatically by ImpRYnt's implementation pipeline." \
            --head "${{ inputs.branchName }}" \
            --base "${{ github.event.repository.default_branch }}")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "number=$(gh pr view "$url" --json number -q .number)" >> "$GITHUB_OUTPUT"

      - name: Report PR opened to ImpRYnt
        if: success()
        run: |
          PAYLOAD=$(jq -n \
            --argjson prNumber "${{ steps.pr.outputs.number }}" \
            --arg prUrl "${{ steps.pr.outputs.url }}" \
            --arg branchName "${{ inputs.branchName }}" \
            --arg costUsd "${{ steps.usage.outputs.costUsd }}" \
            --arg inputTokens "${{ steps.usage.outputs.inputTokens }}" \
            --arg outputTokens "${{ steps.usage.outputs.outputTokens }}" \
            '{prNumber: $prNumber, prUrl: $prUrl, branchName: $branchName}
             + (if $costUsd != "" then {costUsd: ($costUsd | tonumber)} else {} end)
             + (if $inputTokens != "" then {inputTokens: ($inputTokens | tonumber)} else {} end)
             + (if $outputTokens != "" then {outputTokens: ($outputTokens | tonumber)} else {} end)')
          curl -sf -X POST "https://imprynt.space/api/v1/pipeline/ticket-runs/${{ inputs.ticketRunId }}/pr-opened" \
            -H "Authorization: Bearer ${{ secrets.IMPRYNT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Auto-merge if tests passed
        if: success() && fromJSON(steps.agent.outputs.structured_output || '{}').testsPass == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --squash --delete-branch "${{ steps.pr.outputs.url }}"


      - name: Report failure to ImpRYnt
        if: failure()
        run: |
          PAYLOAD=$(jq -n \
            --arg errorMessage "The agent run failed — see the Actions log for run ${{ github.run_id }}." \
            --arg costUsd "${{ steps.usage.outputs.costUsd }}" \
            --arg inputTokens "${{ steps.usage.outputs.inputTokens }}" \
            --arg outputTokens "${{ steps.usage.outputs.outputTokens }}" \
            '{errorMessage: $errorMessage}
             + (if $costUsd != "" then {costUsd: ($costUsd | tonumber)} else {} end)
             + (if $inputTokens != "" then {inputTokens: ($inputTokens | tonumber)} else {} end)
             + (if $outputTokens != "" then {outputTokens: ($outputTokens | tonumber)} else {} end)')
          curl -sf -X POST "https://imprynt.space/api/v1/pipeline/ticket-runs/${{ inputs.ticketRunId }}/failed" \
            -H "Authorization: Bearer ${{ secrets.IMPRYNT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  # Fires on every PR close; only acts on PRs the "implement" job itself
  # opened (recognized by the imprynt/ticket-run-<id> branch prefix, which
  # is where the TicketRun id round-trips back to ImpRYnt from). Merging
  # is what actually advances the pipeline to the next ticket; closing
  # without merging reports "failed" so the run doesn't hang forever.
  report-merge:
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.head.ref, 'imprynt/ticket-run-')
    runs-on: ubuntu-latest
    steps:
      - name: Extract ticket run id
        id: parse
        run: |
          ref="${{ github.event.pull_request.head.ref }}"
          echo "ticketRunId=${ref#imprynt/ticket-run-}" >> "$GITHUB_OUTPUT"

      - name: Report merged
        if: github.event.pull_request.merged == true
        run: |
          curl -sf -X POST "https://imprynt.space/api/v1/pipeline/ticket-runs/${{ steps.parse.outputs.ticketRunId }}/merged" \
            -H "Authorization: Bearer ${{ secrets.IMPRYNT_API_TOKEN }}"

      - name: Report closed without merge
        if: github.event.pull_request.merged != true
        run: |
          curl -sf -X POST "https://imprynt.space/api/v1/pipeline/ticket-runs/${{ steps.parse.outputs.ticketRunId }}/failed" \
            -H "Authorization: Bearer ${{ secrets.IMPRYNT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"errorMessage\": \"The PR was closed without merging.\"}"
